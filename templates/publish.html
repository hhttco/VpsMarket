<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上架云资源 - VPS MARKET</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: radial-gradient(circle at 50% 0%, #17153b 0%, #0c1020 80%); min-height: 100vh; color: #f1f5f9; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .publish-card { background: rgba(22, 30, 54, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); padding: 40px; border-radius: 28px; width: 100%; max-width: 680px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4); text-align: center; }
        .title { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 25px; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; background: rgba(12, 16, 32, 0.3); padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); }
        .preset-label { font-size: 12px; color: #94a3b8; width: 100%; margin-bottom: 4px; font-weight: 600; }
        .badge-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); color: #cbd5e1; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .badge-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; text-align: left; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; }
        .form-label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .form-input { background: rgba(12, 16, 32, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px 16px; border-radius: 14px; color: #fff; font-size: 14px; transition: all 0.3s; outline: none; }
        .form-input:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.25); background: rgba(12, 16, 32, 0.7); }
        
        /* 周期单选胶囊舱 */
        .cycle-box { display: flex; gap: 10px; background: rgba(12, 16, 32, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); padding: 6px; border-radius: 14px; }
        .cycle-opt { flex: 1; text-align: center; position: relative; }
        .cycle-opt input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .cycle-text { display: block; padding: 8px; font-size: 13px; font-weight: 600; color: #64748b; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .cycle-opt input:checked + .cycle-text { background: #6366f1; color: #fff; }

        .btn-group { margin-top: 35px; display: flex; gap: 15px; }
        .btn { flex: 1; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; text-align: center; text-decoration: none; }
        .btn-submit { background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); color: #fff; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .btn-submit:hover { transform: translateY(-1px); opacity: 0.95; }
        .btn-cancel { background: rgba(255, 255, 255, 0.03); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.06); }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        @media (max-width: 550px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="publish-card">
        <div class="title">上架云实例</div>
        <div class="subtitle">请精确同步真实续费参数与到期日，系统将实时精算折价率反馈市场</div>
        
        <!-- 一键闪电默认填入选项控制台 -->
        <div class="preset-group">
            <div class="preset-label">⚡ 常用主流配置一键秒级填入</div>
            <button class="badge-btn" onclick="applyPreset('搬瓦工 BWG', '美国 洛杉矶 CN2 GIA', '2核', '2GB', '40GB SSD', '1TB/月', '10 Gbps', 350, 560, 365, '2027-02-15')">搬瓦工 年付</button>
            <button class="badge-btn" onclick="applyPreset('DMIT', '中国 香港 CN2 GIA', '1核', '1GB', '20GB NVMe', '400GB/月', '100 Mbps', 180, 280, 180, '2026-11-20')">DMIT 半年付</button>
            <button class="badge-btn" onclick="applyPreset('斯巴达 Spartan', '美国 西雅图 4837', '1核', '1GB', '25GB SSD', '2TB/月', '10 Gbps', 45, 84, 365, '2027-05-10')">斯巴达 传家宝</button>
            <button class="badge-btn" onclick="applyPreset('Hetzner', '德国 芬兰 AX', '6核 AMD', '64GB ECC', '1TB NVMe', '20TB/月', '1 Gbps', 150, 260, 30, '2026-08-30')">Hetzner 月付独服</button>
        </div>

        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">服务商品牌名称</label>
                    <input type="text" id="provider" name="provider" class="form-input" placeholder="如：瓦工、DMIT" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">机房具体位置</label>
                    <input type="text" id="location" name="location" class="form-input" placeholder="如：美国西雅图、日本东京" required>
                </div>
                <div class="form-group">
                    <label class="form-label">CPU 规格</label>
                    <input type="text" id="cpu" name="cpu" class="form-input" placeholder="如：1核、2核" required>
                </div>
                <div class="form-group">
                    <label class="form-label">动态运行内存</label>
                    <input type="text" id="memory" name="memory" class="form-input" placeholder="如：1GB" required>
                </div>
                <div class="form-group">
                    <label class="form-label">高速存储空间</label>
                    <input type="text" id="disk" name="disk" class="form-input" placeholder="如：20GB SSD" required>
                </div>
                <div class="form-group">
                    <label class="form-label">端口网络速率</label>
                    <input type="text" id="port_speed" name="port_speed" class="form-input" placeholder="如：1Gbps" required>
                </div>
                <div class="form-group full-width">
                    <label class="form-label">每月配额流量</label>
                    <input type="text" id="bandwidth" name="bandwidth" class="form-input" placeholder="如：1TB/月" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">💵 当前转让一口价 (元)</label>
                    <input type="number" id="sale_price" name="sale_price" min="0" step="0.01" class="form-input" placeholder="只需填纯数字，如：150" required>
                </div>
                <div class="form-group">
                    <label class="form-label">🔄 原厂续费单价 (元)</label>
                    <input type="number" id="renewal_price" name="renewal_price" min="0" step="0.01" class="form-input" placeholder="只需填纯数字，如：350" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">📅 机器续费支付周期</label>
                    <div class="cycle-box">
                        <label class="cycle-opt">
                            <input type="radio" name="renewal_cycle" id="cycle_month" value="30">
                            <span class="cycle-text">月付 (30天)</span>
                        </label>
                        <label class="cycle-opt">
                            <input type="radio" name="renewal_cycle" id="cycle_half" value="180">
                            <span class="cycle-text">半年付 (180天)</span>
                        </label>
                        <label class="cycle-opt">
                            <input type="radio" name="renewal_cycle" id="cycle_year" value="365" checked>
                            <span class="cycle-text">年付 (365天)</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">⏳ 合同剩余到期日</label>
                    <input type="date" id="expiry_date" name="expiry_date" class="form-input" required>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">买家可见联系方式</label>
                    <input type="text" id="contact" name="contact" class="form-input" placeholder="如：TG: @vps_seller / QQ: 123456" required>
                </div>
            </div>
            <div class="btn-group">
                <a href="/" class="btn btn-cancel">放弃发布</a>
                <button type="submit" class="btn btn-submit">确认上架实例</button>
            </div>
        </form>
    </div>
    <script>
        // 动态绑定限制：合同到期日不能选择历史时间
        document.getElementById('expiry_date').min = new Date().toISOString().split('T')[0];

        function applyPreset(p, l, c, m, d, b, s, sp, rp, cycle, exp) {
            document.getElementById('provider').value = p;
            document.getElementById('location').value = l;
            document.getElementById('cpu').value = c;
            document.getElementById('memory').value = m;
            document.getElementById('disk').value = d;
            document.getElementById('bandwidth').value = b;
            document.getElementById('port_speed').value = s;
            document.getElementById('sale_price').value = sp;
            document.getElementById('renewal_price').value = rp;
            document.getElementById('expiry_date').value = exp;
            
            // 自动勾选单选框
            if(cycle == 30) document.getElementById('cycle_month').checked = true;
            else if(cycle == 180) document.getElementById('cycle_half').checked = true;
            else document.getElementById('cycle_year').checked = true;
        }
    </script>
</body>
</html>
