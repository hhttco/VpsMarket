<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全登录 - VPS 交易集市</title>
    <style>
        /* 延续全局极光暗黑底色 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 70%); min-height: 100vh; color: #f8fafc; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* 极致磨砂毛玻璃卡片 */
        .login-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
        .title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 14px; color: #94a3b8; text-align: center; margin-bottom: 30px; }
        
        /* 表单微光输入框 */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
        .form-input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 12px; color: #fff; font-size: 14px; transition: all 0.3s; outline: none; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); background: rgba(15, 23, 42, 0.8); }
        
        /* 渐变流光提交按钮 */
        .btn-submit { width: 100%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: none; padding: 14px; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.2s, opacity 0.2s; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.95; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(1px); }
        
        /* 错误提示框 */
        .alert-box { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 12px; border-radius: 12px; font-size: 13px; text-align: center; margin-bottom: 20px; }
        .footer-link { text-align: center; margin-top: 25px; font-size: 13px; }
        .footer-link a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="title">安全登录</div>
        <div class="subtitle">登录后即可极速发布并流转您的云资源</div>

        <!-- 动态捕获后台账号密码报错 -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-box">⚠️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">账户用户名</label>
                <input type="text" name="username" class="form-input" placeholder="请输入您的用户名" required autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">安全密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入您的登录密码" required>
            </div>
            <button type="submit" class="btn-submit">验证身份并登录</button>
        </form>

        <div class="footer-link">
            <span style="color: #64748b;">还没有入驻平台？</span>
            <a href="/register">立即创建账户</a>
        </div>
    </div>

</body>
</html>
